<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>3D해결사</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <!-- ✅ 헤더 -->
  <header>
    <div class="logo">3D해결사</div>
    <div class="auth">
      <a href="#" id="loginBtn">로그인</a>
      <a href="#" class="signup">회원가입</a>
    </div>
  </header>

  <!-- ✅ 로그인 모달 -->
  <div id="loginModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <h2>로그인</h2>
        <button id="closeLoginBtn">&times;</button>
      </div>
      <form class="login-form">
        <div class="input-group">
          <label for="email">이메일</label>
          <input type="email" id="email" placeholder="email@example.com" required>
        </div>
        <div class="input-group">
          <label for="password">비밀번호</label>
          <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
        </div>
        <button type="submit" class="btn btn-primary login-submit">로그인하기</button>
      </form>
    </div>
  </div>

  <!-- 메인 -->
  <section class="hero">
    <h1>
      어렵고 위험하고 더러운 일,<br>
      전문가가 팀으로 해결합니다
    </h1>
    <p>
      철거, 폐기물, 원상복구, 하구수 처리까지<br>
      믿을 수 있는 전문가 팀을 연결해드립니다
    </p>

    <div class="buttons">
      <button class="btn btn-primary">팀으로 맡기기</button>
      <button class="btn btn-secondary">인력 지원 요청</button>
    </div>
  </section>

  <!-- 서비스 -->
  <section class="section">
    <h2>주요 서비스</h2>
    <div class="cards">
      <div class="card">상가 철거</div>
      <div class="card">폐기물 처리</div>
      <div class="card">상가 원상복구</div>
      <div class="card">하수구 배관</div>
      <div class="card">전기</div>
    </div>
  </section>

  <!-- 특징 -->
  <section class="section">
    <h2>왜 3D해결사인가?</h2>
    <div class="cards">
      <div class="card">✔ 전문가 팀 매칭</div>
      <div class="card">✔ 빠른 견적</div>
      <div class="card">✔ 안전한 작업</div>
      <div class="card">✔ 수도권 집중 서비스</div>
    </div>
  </section>

  <footer>
    3D해결사는 작업 중개 플랫폼입니다.<br>
    실제 계약은 고객과 작업팀 간에 이루어집니다.
  </footer>
</div>

<script src="main.js"></script>
</body>
</html>
